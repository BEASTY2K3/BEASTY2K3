<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%" style="border-radius: 8px;">
  <style>
    /* Keyframe Animations */
    @keyframes drift1 {
      0% { transform: translate(0px, 0px); opacity: 0; }
      15% { opacity: 0.7; }
      85% { opacity: 0.7; }
      100% { transform: translate(-180px, -200px); opacity: 0; }
    }
    @keyframes drift2 {
      0% { transform: translate(0px, 0px); opacity: 0; }
      20% { opacity: 0.5; }
      80% { opacity: 0.5; }
      100% { transform: translate(-300px, -150px); opacity: 0; }
    }
    @keyframes drift3 {
      0% { transform: translate(0px, 0px); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translate(-120px, -240px); opacity: 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.12; transform: scale(1); }
      50% { opacity: 0.28; transform: scale(1.08); }
    }
    @keyframes textGlow {
      0%, 100% { fill: #ff003c; filter: drop-shadow(0px 0px 4px rgba(255, 0, 60, 0.6)); }
      50% { fill: #ff3366; filter: drop-shadow(0px 0px 12px rgba(255, 0, 60, 0.9)); }
    }
    @keyframes borderPulse {
      0%, 100% { stroke: #4a0e17; }
      50% { stroke: #ff003c; }
    }

    /* Assigning animations to classes */
    .glow-bg {
      transform-origin: center;
      animation: pulseGlow 6s ease-in-out infinite;
    }
    .gothic-title {
      animation: textGlow 4s ease-in-out infinite;
    }
    .pulsing-border {
      animation: borderPulse 4s ease-in-out infinite;
    }
    .ember1 { animation: drift1 8s linear infinite; }
    .ember2 { animation: drift2 11s linear infinite; }
    .ember3 { animation: drift3 6s linear infinite; }
  </style>

  <defs>
    <!-- Background gradients -->
    <linearGradient id="gothicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="60%" stop-color="#080102" />
      <stop offset="100%" stop-color="#150003" />
    </linearGradient>
    
    <!-- Red glowing radial gradients -->
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff003c" stop-opacity="0" />
    </radialGradient>

    <!-- Blur filter -->
    <filter id="heavyBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>

    <!-- Gothic Rose Pattern Grid -->
    <pattern id="gothicRosette" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0,20 Q 10,0 20,20 Q 30,0 40,20" stroke="#4a0e17" stroke-width="0.75" fill="none" opacity="0.25" />
      <path d="M 0,20 Q 10,40 20,20 Q 30,40 40,20" stroke="#4a0e17" stroke-width="0.75" fill="none" opacity="0.25" />
      <circle cx="20" cy="20" r="2" fill="#8b0000" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Base Gothic Dark Background -->
  <rect width="850" height="280" fill="url(#gothicGrad)" />
  
  <!-- Rosette Texture Overlay -->
  <rect width="850" height="280" fill="url(#gothicRosette)" />

  <!-- Animated Ambient Blood Glows -->
  <circle cx="120" cy="140" r="130" fill="url(#glowRed)" class="glow-bg" filter="url(#heavyBlur)" />
  <circle cx="700" cy="80" r="150" fill="url(#glowRed)" class="glow-bg" filter="url(#heavyBlur)" />

  <!-- Sharp Gothic Geometric Framing -->
  <!-- Borders -->
  <rect x="15" y="15" width="820" height="250" rx="4" fill="none" stroke="#380a11" stroke-width="1.5" />
  <rect x="20" y="20" width="810" height="240" rx="2" fill="none" stroke="#1c0407" stroke-width="1" />
  
  <!-- Corner Trims -->
  <path d="M 12,35 L 35,12" stroke="#ff003c" stroke-width="1.5" opacity="0.7" />
  <path d="M 838,35 L 815,12" stroke="#ff003c" stroke-width="1.5" opacity="0.7" />
  <path d="M 12,245 L 35,268" stroke="#ff003c" stroke-width="1.5" opacity="0.7" />
  <path d="M 838,245 L 815,268" stroke="#ff003c" stroke-width="1.5" opacity="0.7" />

  <!-- Horizontal Grid Bars -->
  <line x1="20" y1="45" x2="830" y2="45" stroke="#380a11" stroke-width="1.5" />
  <line x1="20" y1="235" x2="830" y2="235" stroke="#380a11" stroke-width="1.5" />

  <!-- LEFT PANEL: Elegant Gothic Typography -->
  <g transform="translate(60, 75)">
    <!-- Sub-badge -->
    <rect x="0" y="0" width="130" height="24" rx="2" fill="#1c0508" stroke="#ff003c" stroke-width="0.75" />
    <text x="12" y="16" fill="#e0e0e0" font-family="'Georgia', serif" font-size="10" font-weight="bold" letter-spacing="2.5">CORE ENGINEER</text>

    <!-- Main Title (Gothic serif typography) -->
    <text x="0" y="65" font-family="'Georgia', 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#ff003c" class="gothic-title" letter-spacing="1">HARI VIGNESH</text>
    
    <!-- Subtitle -->
    <text x="0" y="98" font-family="'Georgia', serif" font-size="14" font-style="italic" fill="#e0e0e0" letter-spacing="1">CREATIVE ENGINEERING &amp; FULL-STACK SYSTEMS</text>
    
    <!-- Accent Line -->
    <line x1="0" y1="120" x2="350" y2="120" stroke="#8b0000" stroke-width="2" />
    <line x1="0" y1="120" x2="180" y2="120" stroke="#ff003c" stroke-width="2" />
    
    <!-- Stack Focus -->
    <text x="0" y="145" font-family="Courier, monospace" font-size="11" font-weight="bold" fill="#ff003c" letter-spacing="4.5">NEXT.JS / TYPESCRIPT / NODE.JS / JAVA</text>
  </g>

  <!-- RIGHT PANEL: Gothic terminal block -->
  <g transform="translate(490, 60)">
    <!-- Terminal Outer Shadow/Glow -->
    <rect x="-3" y="3" width="300" height="160" rx="4" fill="#000000" opacity="0.6" />
    <!-- Terminal frame -->
    <rect width="300" height="160" rx="4" fill="#090103" stroke="#4a0e17" stroke-width="1.5" class="pulsing-border" />
    
    <!-- Terminal bar -->
    <rect width="300" height="26" rx="4" fill="#150205" />
    <!-- Header buttons -->
    <circle cx="15" cy="13" r="4.5" fill="#ff003c" />
    <circle cx="28" cy="13" r="4.5" fill="#8b0000" />
    <circle cx="41" cy="13" r="4.5" fill="#1c0407" />
    
    <!-- Code display -->
    <g font-family="Courier, monospace" font-size="11" font-weight="bold" xml:space="preserve">
      <text x="18" y="52" fill="#ff003c">system <tspan fill="#e0e0e0">{</tspan></text>
      
      <text x="30" y="72" fill="#8b0000">developer<tspan fill="#e0e0e0">:</tspan> <tspan fill="#ff003c">"Hari Vignesh"</tspan><tspan fill="#e0e0e0">,</tspan></text>
      
      <text x="30" y="92" fill="#8b0000">aesthetic<tspan fill="#e0e0e0">:</tspan> <tspan fill="#ff003c">"Gothic Black-Red"</tspan><tspan fill="#e0e0e0">,</tspan></text>
      
      <text x="30" y="112" fill="#8b0000">focus<tspan fill="#e0e0e0">:</tspan> <tspan fill="#ff003c">"TypeScript/Systems"</tspan><tspan fill="#e0e0e0">,</tspan></text>
      
      <text x="30" y="132" fill="#8b0000">status<tspan fill="#e0e0e0">:</tspan> <tspan fill="#ff003c">"Always Building"</tspan></text>
      
      <text x="18" y="148" fill="#e0e0e0">}</text>
    </g>
  </g>

  <!-- Floating Gothic Embers / Dust Particles -->
  <g fill="#ff003c" opacity="0">
    <!-- Particle group 1 -->
    <circle cx="780" cy="240" r="1.5" class="ember1" />
    <circle cx="760" cy="220" r="1" class="ember1" style="animation-delay: 2s;" />
    <circle cx="810" cy="230" r="2" class="ember1" style="animation-delay: 4s;" />
    
    <!-- Particle group 2 -->
    <circle cx="790" cy="250" r="1.5" class="ember2" />
    <circle cx="730" cy="210" r="2" class="ember2" style="animation-delay: 3s;" />
    <circle cx="820" cy="260" r="1" class="ember2" style="animation-delay: 6s;" />

    <!-- Particle group 3 -->
    <circle cx="750" cy="235" r="2.5" class="ember3" />
    <circle cx="770" cy="245" r="1" class="ember3" style="animation-delay: 1.5s;" />
    <circle cx="800" cy="225" r="1.5" class="ember3" style="animation-delay: 4.5s;" />
  </g>
</svg>
