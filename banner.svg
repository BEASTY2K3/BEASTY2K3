<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%" style="border-radius: 8px;">
  <defs>
    <!-- Dracula Color Gradients -->
    <linearGradient id="neonPinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff79c6" />
      <stop offset="100%" stop-color="#bd93f9" />
    </linearGradient>
    <linearGradient id="neonCyanBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8be9fd" />
      <stop offset="100%" stop-color="#6272a4" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Dot Grid Pattern -->
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#6272a4" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Base Theme Background -->
  <rect width="850" height="280" fill="#282a36" />
  
  <!-- Dot Grid Pattern Overlay -->
  <rect width="850" height="280" fill="url(#dotGrid)" />

  <!-- Ambient Neon Radial Glows -->
  <circle cx="150" cy="80" r="120" fill="#bd93f9" opacity="0.15" filter="url(#glow)" />
  <circle cx="700" cy="200" r="140" fill="#8be9fd" opacity="0.12" filter="url(#glow)" />
  <circle cx="450" cy="140" r="100" fill="#ff79c6" opacity="0.1" filter="url(#glow)" />

  <!-- Abstract Tech Grid Lines (Dracula Comments Theme) -->
  <path d="M 0,40 L 850,40" stroke="#44475a" stroke-width="1" stroke-dasharray="5 5" opacity="0.3" />
  <path d="M 0,240 L 850,240" stroke="#44475a" stroke-width="1" stroke-dasharray="5 5" opacity="0.3" />
  <path d="M 120,0 L 120,280" stroke="#44475a" stroke-width="1" stroke-dasharray="5 5" opacity="0.2" />

  <!-- Decorative Corner Brackets -->
  <path d="M 20,40 L 20,20 L 40,20" stroke="#ff79c6" stroke-width="2" fill="none" opacity="0.6" />
  <path d="M 830,240 L 830,260 L 810,260" stroke="#8be9fd" stroke-width="2" fill="none" opacity="0.6" />

  <!-- LEFT PANEL: Typography / Branding -->
  <g transform="translate(50, 65)">
    <!-- Tech Accent Tag -->
    <rect x="0" y="0" width="105" height="22" rx="4" fill="#44475a" />
    <text x="12" y="15" fill="#50fa7b" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">FULL-STACK</text>

    <!-- Main Title -->
    <text x="0" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="url(#neonPinkPurple)" letter-spacing="1">HARI VIGNESH</text>
    
    <!-- Subtitle / Role -->
    <text x="0" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f8f8f2" letter-spacing="0.5">SOFTWARE ENGINEER &amp; CREATIVE DEVELOPER</text>
    
    <!-- Detail Line -->
    <line x1="0" y1="120" x2="350" y2="120" stroke="#ff79c6" stroke-width="2" opacity="0.8" />
    
    <!-- Focus Areas -->
    <text x="0" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#8be9fd" letter-spacing="3">NEXT.JS | TYPESCRIPT | NODE.JS | JAVA</text>
  </g>

  <!-- RIGHT PANEL: Sleek Code Terminal Mockup -->
  <g transform="translate(480, 50)">
    <!-- Terminal Shadow -->
    <rect x="-5" y="5" width="320" height="180" rx="8" fill="#1e1f29" opacity="0.5" />
    <!-- Terminal Outer Frame -->
    <rect width="320" height="180" rx="8" fill="#1e1f29" stroke="#44475a" stroke-width="1.5" />
    
    <!-- Terminal Header Bar -->
    <rect width="320" height="30" rx="8" fill="#282a36" />
    <!-- Window Control Buttons (Dracula Theme Colors) -->
    <circle cx="18" cy="15" r="5" fill="#ff5555" />
    <circle cx="34" cy="15" r="5" fill="#f1fa8c" />
    <circle cx="50" cy="15" r="5" fill="#50fa7b" />
    <!-- Terminal Title -->
    <text x="160" y="20" fill="#6272a4" font-family="Courier, monospace" font-size="11" font-weight="bold" text-anchor="middle">developer.json</text>

    <!-- Terminal Code Text -->
    <g font-family="Courier, monospace" font-size="11.5" font-weight="bold" xml:space="preserve">
      <!-- Line 1 -->
      <text x="20" y="60">
        <tspan fill="#ff79c6">const</tspan> <tspan fill="#8be9fd">developer</tspan> = {
      </text>
      <!-- Line 2 -->
      <text x="35" y="80">
        <tspan fill="#8be9fd">name</tspan>: <tspan fill="#f1fa8c">"Hari Vignesh"</tspan>,
      </text>
      <!-- Line 3 -->
      <text x="35" y="100">
        <tspan fill="#8be9fd">identity</tspan>: <tspan fill="#f1fa8c">"beasty2k3"</tspan>,
      </text>
      <!-- Line 4 -->
      <text x="35" y="120">
        <tspan fill="#8be9fd">focus</tspan>: [
        <tspan fill="#ffb86c">"web"</tspan>, 
        <tspan fill="#ffb86c">"systems"</tspan>
        ],
      </text>
      <!-- Line 5 -->
      <text x="35" y="140">
        <tspan fill="#8be9fd">status</tspan>: <tspan fill="#f1fa8c">"always building"</tspan>
      </text>
      <!-- Line 6 -->
      <text x="20" y="160">};</text>
    </g>
  </g>
</svg>
