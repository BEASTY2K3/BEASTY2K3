<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%" style="border-radius: 8px;">
  <style>
    /* CSS animations */
    @keyframes spinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.38; transform: scale(1.08); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Target origins centered on the HUD Core (680px, 160px) */
    .rot-cw {
      transform-origin: 680px 160px;
      animation: spinCW 25s linear infinite;
    }
    .rot-ccw {
      transform-origin: 680px 160px;
      animation: spinCCW 18s linear infinite;
    }
    .glow-core {
      transform-origin: 680px 160px;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    .blinking-dot {
      animation: blink 2s infinite;
    }
  </style>

  <defs>
    <!-- Dark Background Gradient -->
    <linearGradient id="cyberGothicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020001" />
      <stop offset="50%" stop-color="#070002" />
      <stop offset="100%" stop-color="#120005" />
    </linearGradient>
    
    <!-- Red glowing radial gradients -->
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff003c" stop-opacity="0" />
    </radialGradient>

    <filter id="heavyBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>

    <!-- Technical Grid Pattern -->
    <pattern id="hudGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30,0 L 0,0 0,30" stroke="#4a0e17" stroke-width="0.5" fill="none" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Base Theme Background -->
  <rect width="850" height="320" fill="url(#cyberGothicBg)" />
  
  <!-- Technical Grid Overlay -->
  <rect width="850" height="320" fill="url(#hudGrid)" />

  <!-- Ambient Blood Glows -->
  <circle cx="150" cy="160" r="140" fill="url(#glowRed)" class="glow-core" filter="url(#heavyBlur)" />
  <circle cx="680" cy="160" r="180" fill="url(#glowRed)" class="glow-core" filter="url(#heavyBlur)" />

  <!-- Sharp HUD Framing & Coordinate Indicators -->
  <!-- Outer border -->
  <rect x="15" y="15" width="820" height="290" rx="4" fill="none" stroke="#380a11" stroke-width="1.5" />
  
  <!-- Corner Trims -->
  <path d="M 10,40 L 10,10 L 40,10" stroke="#ff003c" stroke-width="2.5" fill="none" />
  <path d="M 840,40 L 840,10 L 810,10" stroke="#ff003c" stroke-width="2.5" fill="none" />
  <path d="M 10,280 L 10,310 L 40,310" stroke="#ff003c" stroke-width="2.5" fill="none" />
  <path d="M 840,280 L 840,310 L 810,310" stroke="#ff003c" stroke-width="2.5" fill="none" />

  <!-- HUD Horizontal / Vertical Alignments -->
  <line x1="25" y1="50" x2="825" y2="50" stroke="#380a11" stroke-width="1" stroke-dasharray="10 15" opacity="0.4" />
  <line x1="25" y1="270" x2="825" y2="270" stroke="#380a11" stroke-width="1" stroke-dasharray="10 15" opacity="0.4" />
  <line x1="480" y1="50" x2="480" y2="270" stroke="#380a11" stroke-width="1" stroke-dasharray="5 5" opacity="0.3" />

  <!-- LEFT PANEL: High-Velocity branding -->
  <g transform="translate(50, 75)">
    <!-- Threat / Status Flag -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="135" height="22" rx="2" fill="#1c0508" stroke="#ff003c" stroke-width="1" />
      <circle cx="12" cy="11" r="3" fill="#ff003c" class="blinking-dot" />
      <text x="24" y="15" fill="#e0e0e0" font-family="'Courier New', Courier, monospace" font-size="10.5" font-weight="900" letter-spacing="2">SYS_ACTIVE</text>
    </g>

    <!-- Main Title (Bold Impact Typography) -->
    <text x="0" y="65" font-family="Impact, 'Arial Black', sans-serif" font-size="52" font-weight="900" fill="#ff003c" letter-spacing="2" filter="drop-shadow(0 0 8px rgba(255,0,60,0.4))">HARI VIGNESH</text>
    
    <!-- Focus Label -->
    <text x="0" y="98" font-family="'Courier New', Courier, monospace" font-size="13.5" font-weight="bold" fill="#e0e0e0" letter-spacing="1">FULL-STACK ARCHITECT &amp; SYSTEMS ENGINEER</text>
    
    <!-- Accent Bar -->
    <path d="M 0,118 L 380,118" stroke="#380a11" stroke-width="3" />
    <path d="M 0,118 L 150,118" stroke="#ff003c" stroke-width="3" />
    
    <!-- System Readouts (No-weakness declarations) -->
    <g font-family="'Courier New', Courier, monospace" font-size="10" font-weight="bold" fill="#ff003c" transform="translate(0, 140)">
      <text x="0" y="0" letter-spacing="1.5">ENGINE:  [ NEXT.JS / REACT / TYPESCRIPT ]</text>
      <text x="0" y="20" letter-spacing="1.5">SERVICE: [ SECURE CLOUD APPS / SCALABLE APIs ]</text>
      <text x="0" y="40" letter-spacing="1.5">METRIC:  [ CONTINUOUS INTEGRATION / ZERO LATENCY ]</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Animated Cyber-Gothic HUD Core -->
  <g transform="translate(0, 0)">
    <!-- Ambient glowing core circle -->
    <circle cx="680" cy="160" r="50" fill="url(#glowRed)" class="glow-core" />
    
    <!-- HUD Core Crosshairs -->
    <line x1="680" y1="50" x2="680" y2="270" stroke="#380a11" stroke-width="1.5" opacity="0.4" />
    <line x1="570" y1="160" x2="790" y2="160" stroke="#380a11" stroke-width="1.5" opacity="0.4" />

    <!-- Rotating HUD Rings -->
    <!-- CW Outer Ring -->
    <circle cx="680" cy="160" r="85" stroke="#ff003c" stroke-dasharray="25 45" stroke-width="2" fill="none" class="rot-cw" />
    <!-- CCW Middle Ring -->
    <circle cx="680" cy="160" r="70" stroke="#4a0e17" stroke-dasharray="10 20" stroke-width="1.5" fill="none" class="rot-ccw" />
    <!-- CW Inner Ring -->
    <circle cx="680" cy="160" r="55" stroke="#ff003c" stroke-dasharray="5 15" stroke-width="1" fill="none" class="rot-cw" opacity="0.8" />
    <!-- CCW Center Ring -->
    <circle cx="680" cy="160" r="40" stroke="#4a0e17" stroke-dasharray="60 15" stroke-width="1" fill="none" class="rot-ccw" />

    <!-- HUD Core Center Dot -->
    <circle cx="680" cy="160" r="3" fill="#ff003c" />

    <!-- Technical labels surrounding the HUD -->
    <text x="680" y="67" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="bold" text-anchor="middle">CORE_SCAN</text>
    <text x="680" y="260" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="bold" text-anchor="middle">SYS_LOC_680_160</text>
    <text x="580" y="155" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="bold" text-anchor="start">R-85</text>
    <text x="780" y="155" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="bold" text-anchor="end">CW-25</text>
  </g>
</svg>
