<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="100%" height="100%" style="border-radius: 8px;">
  <style>
    /* CSS animations */
    @keyframes spinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(1.08); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes scanVertical {
      0% { transform: translateY(-5px); }
      50% { transform: translateY(300px); }
      100% { transform: translateY(-5px); }
    }

    /* Target origins centered on HUD Core (670px, 190px) */
    .rot-cw {
      transform-origin: 670px 190px;
      animation: spinCW 28s linear infinite;
    }
    .rot-ccw {
      transform-origin: 670px 190px;
      animation: spinCCW 20s linear infinite;
    }
    .glow-core {
      transform-origin: 670px 190px;
      animation: pulseGlow 5s ease-in-out infinite;
    }
    .blinking {
      animation: blink 2.5s infinite;
    }
    .laser-line {
      animation: scanVertical 6s ease-in-out infinite;
    }
  </style>

  <defs>
    <!-- Background Gradients -->
    <linearGradient id="gothicCyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010001" />
      <stop offset="60%" stop-color="#080003" />
      <stop offset="100%" stop-color="#140007" />
    </linearGradient>
    
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff003c" stop-opacity="0" />
    </radialGradient>

    <filter id="blurFilter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" />
    </filter>

    <!-- Technical Grid Pattern -->
    <pattern id="hudGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25,0 L 0,0 0,25" stroke="#4a0e17" stroke-width="0.5" fill="none" opacity="0.2" />
      <circle cx="25" cy="25" r="0.75" fill="#ff003c" opacity="0.2" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="850" height="380" fill="url(#gothicCyberBg)" />
  
  <!-- Grid Texture Overlay -->
  <rect width="850" height="380" fill="url(#hudGrid)" />

  <!-- Ambient Red Core Glows -->
  <circle cx="150" cy="190" r="160" fill="url(#glowRed)" class="glow-core" filter="url(#blurFilter)" />
  <circle cx="670" cy="190" r="210" fill="url(#glowRed)" class="glow-core" filter="url(#blurFilter)" />

  <!-- Cybernetic HUD Framing -->
  <rect x="15" y="15" width="820" height="350" rx="6" fill="none" stroke="#380a11" stroke-width="2" />
  
  <!-- Outer Corner HUD Accents -->
  <path d="M 10,50 L 10,10 L 50,10" stroke="#ff003c" stroke-width="3.5" fill="none" />
  <path d="M 840,50 L 840,10 L 800,10" stroke="#ff003c" stroke-width="3.5" fill="none" />
  <path d="M 10,330 L 10,370 L 50,370" stroke="#ff003c" stroke-width="3.5" fill="none" />
  <path d="M 840,330 L 840,370 L 800,370" stroke="#ff003c" stroke-width="3.5" fill="none" />

  <!-- Technical Division Lines -->
  <line x1="25" y1="60" x2="825" y2="60" stroke="#ff003c" stroke-width="0.75" opacity="0.4" />
  <line x1="25" y1="320" x2="825" y2="320" stroke="#ff003c" stroke-width="0.75" opacity="0.4" />
  <line x1="450" y1="60" x2="450" y2="320" stroke="#380a11" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.4" />

  <!-- Laser Scanline Indicator (Vertically Animating) -->
  <line x1="25" y1="0" x2="825" y2="0" stroke="#ff003c" stroke-width="1.5" opacity="0.15" class="laser-line" />

  <!-- LEFT PANEL: Technical Typography & Readouts -->
  <g transform="translate(50, 95)">
    <!-- Active Status Module -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="150" height="24" rx="3" fill="#150205" stroke="#ff003c" stroke-width="1" />
      <circle cx="14" cy="12" r="3.5" fill="#ff003c" class="blinking" />
      <text x="28" y="16" fill="#e0e0e0" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="900" letter-spacing="2.5">CORE_RUNNING</text>
    </g>

    <!-- Header name (Impact Gothic) -->
    <text x="0" y="70" font-family="Impact, 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#ff003c" letter-spacing="1.5" filter="drop-shadow(0 0 10px rgba(255,0,60,0.45))">HARI VIGNESH</text>
    
    <!-- Professional description -->
    <text x="0" y="105" font-family="'Courier New', Courier, monospace" font-size="14.5" font-weight="bold" fill="#e0e0e0" letter-spacing="0.5">FULL-STACK ARCHITECT &amp; SYSTEMS ENGINEER</text>
    
    <!-- Accent Line -->
    <line x1="0" y1="125" x2="370" y2="125" stroke="#380a11" stroke-width="3" />
    <line x1="0" y1="125" x2="160" y2="125" stroke="#ff003c" stroke-width="3" />
    
    <!-- Cyber HUD Technical Parameters (No-weakness) -->
    <g font-family="'Courier New', Courier, monospace" font-size="10.5" font-weight="bold" fill="#ff003c" transform="translate(0, 150)">
      <text x="0" y="0" opacity="0.9">SYSTEM_ID:   [ BEASTY2K3 // SECURITY_L3 ]</text>
      <text x="0" y="22" opacity="0.9">FRAMEWORK:   [ NEXT.JS // REACT // NODE.JS ]</text>
      <text x="0" y="44" opacity="0.9">DATABASES:   [ POSTGRESQL // MONGODB // REDIS ]</text>
      <text x="0" y="66" opacity="0.9">MONITORING:  [ SYSTEM_ACTIVE // ZERO_DOWNTIME ]</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Animated Cybernetic Radar / Mainframe Core -->
  <g transform="translate(0, 0)">
    <!-- Center Orb Glow -->
    <circle cx="670" cy="190" r="50" fill="url(#glowRed)" class="glow-core" />

    <!-- HUD Radials and Coordinate Lines -->
    <line x1="670" y1="60" x2="670" y2="320" stroke="#380a11" stroke-width="1.5" opacity="0.5" />
    <line x1="540" y1="190" x2="800" y2="190" stroke="#380a11" stroke-width="1.5" opacity="0.5" />
    
    <!-- Diagonal crosshairs -->
    <line x1="578" y1="98" x2="762" y2="282" stroke="#380a11" stroke-width="1" opacity="0.3" stroke-dasharray="3 5" />
    <line x1="578" y1="282" x2="762" y2="98" stroke="#380a11" stroke-width="1" opacity="0.3" stroke-dasharray="3 5" />

    <!-- Rotating HUD Ring System -->
    <!-- Outermost CW Ring -->
    <circle cx="670" cy="190" r="105" stroke="#ff003c" stroke-dasharray="35 50" stroke-width="2.5" fill="none" class="rot-cw" />
    <circle cx="670" cy="190" r="95" stroke="#4a0e17" stroke-width="1" fill="none" opacity="0.3" />
    <!-- Mid CCW Ring -->
    <circle cx="670" cy="190" r="80" stroke="#ff003c" stroke-dasharray="15 25" stroke-width="1.5" fill="none" class="rot-ccw" />
    <!-- Inner CW Ring -->
    <circle cx="670" cy="190" r="62" stroke="#4a0e17" stroke-dasharray="5 12" stroke-width="1" fill="none" class="rot-cw" />
    <!-- Innermost CCW Ring -->
    <circle cx="670" cy="190" r="45" stroke="#ff003c" stroke-dasharray="45 15" stroke-width="1" fill="none" class="rot-ccw" />

    <!-- HUD Center Lock Core -->
    <circle cx="670" cy="190" r="4" fill="#ff003c" />

    <!-- Floating HUD Telemetry Readouts -->
    <text x="670" y="80" fill="#ff003c" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="900" text-anchor="middle" letter-spacing="1">RADAR_LOCK</text>
    <text x="670" y="308" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="0.5">SYS_POS: 670//190</text>
    <text x="548" y="185" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8.5" font-weight="bold" text-anchor="start">R_105</text>
    <text x="792" y="185" fill="#4a0e17" font-family="'Courier New', Courier, monospace" font-size="8.5" font-weight="bold" text-anchor="end">CW_28s</text>
  </g>
</svg>
